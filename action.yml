name: uv Scrollguard
description: Require current uv lockfiles for PEP 723 scripts
inputs:
  existing-only:
    description: Check existing lockfiles without requiring missing ones
    required: false
    default: "false"
  paths:
    description: Optional newline-delimited files and/or directories to check
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Check script lockfiles
      env:
        UV_SCROLLGUARD_EXISTING_ONLY: ${{ inputs['existing-only'] }}
        UV_SCROLLGUARD_PATHS: ${{ inputs.paths }}
      shell: bash
      run: |
        args=()
        if [[ -n "${UV_SCROLLGUARD_PATHS}" ]]; then
          args+=(--paths-from-env UV_SCROLLGUARD_PATHS)
        fi
        case "${UV_SCROLLGUARD_EXISTING_ONLY}" in
          true) args+=(--existing-only) ;;
          false) ;;
          *)
            printf 'error: existing-only must be true or false\n' >&2
            exit 2
            ;;
        esac
        if ! command -v uv >/dev/null 2>&1; then
          printf 'error: uv is required on PATH\n' >&2
          exit 3
        fi
        uv tool run --from "${GITHUB_ACTION_PATH}" uv-scrollguard "${args[@]}"
